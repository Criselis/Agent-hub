<!DOCTYPE html>
<html lang="es-MX" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentHub — Panel de Administración</title>
  <meta name="description" content="AgentHub - Plataforma de Alquiler de Agentes IA">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%233b82f6'/><text x='16' y='22' font-size='18' font-weight='bold' text-anchor='middle' fill='white'>A</text></svg>">

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
        },
      },
    };
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#F5F7FA] dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

  <!-- ============================================================
       SIDEBAR BACKDROP (Mobile)
       ============================================================ -->
  <div id="sidebar-backdrop" class="sidebar-backdrop" onclick="window._closeMobileSidebar()" aria-hidden="true"></div>

  <!-- ============================================================
       SIDEBAR (White background)
       ============================================================ -->
  <aside id="sidebar" class="sidebar fixed top-0 left-0 flex flex-col" aria-label="Navegación principal">
    <!-- Logo -->
    <div class="flex items-center gap-3 px-6 h-16 border-b border-gray-100 dark:border-gray-700 flex-shrink-0">
      <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center text-white font-bold text-sm">A</div>
      <div>
        <span class="text-gray-900 dark:text-white font-bold text-lg tracking-tight">AgentHub</span>
        <span class="block text-[10px] text-gray-400 dark:text-gray-500 font-medium uppercase tracking-widest">Admin Panel</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav flex-1 py-4 overflow-y-auto" aria-label="Secciones">
      <div class="px-4 pb-2">
        <p class="text-[11px] font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-widest px-2">Menú Principal</p>
      </div>
      <a href="#" data-section="dashboard" class="active" onclick="window._navigateTo('dashboard')" aria-label="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="#" data-section="users" onclick="window._navigateTo('users')" aria-label="Gestión de usuarios">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Usuarios</span>
      </a>
      <a href="#" data-section="agents" onclick="window._navigateTo('agents')" aria-label="Gestión de agentes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/>
          <circle cx="12" cy="5" r="2"/>
          <path d="M12 7v4"/>
          <line x1="8" y1="16" x2="8" y2="16"/>
          <line x1="16" y1="16" x2="16" y2="16"/>
        </svg>
        <span>Agentes</span>
      </a>
      <a href="#" data-section="skills" onclick="window._navigateTo('skills')" aria-label="Skills">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span>Skills</span>
      </a>
      <a href="#" data-section="contracts" onclick="window._navigateTo('contracts')" aria-label="Contrataciones">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>Contrataciones</span>
      </a>
      <a href="#" data-section="error_logs" onclick="window._navigateTo('error_logs')" aria-label="Log de errores">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span>Log de Errores</span>
      </a>
    </nav>

    <!-- Sidebar Footer -->
    <div class="px-6 py-4 border-t border-gray-100 dark:border-gray-700">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900/40 flex items-center justify-center text-blue-600 dark:text-blue-400 text-xs font-bold">AD</div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-700 dark:text-gray-300 truncate">Admin</p>
          <p class="text-xs text-gray-400 dark:text-gray-500 truncate">admin@agenthub.io</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- ============================================================
       MAIN CONTENT
       ============================================================ -->
  <div class="main-content">

    <!-- Topbar -->
    <header class="topbar flex items-center justify-between px-4 lg:px-8">
      <div class="flex items-center gap-3">
        <button class="hamburger-btn" onclick="window._openMobileSidebar()" aria-label="Abrir menú">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <h1 id="section-title" class="text-lg font-semibold text-gray-900 dark:text-white">Dashboard</h1>
      </div>
      <div class="flex items-center gap-4">
        <!-- Search Bar -->
        <div class="search-bar hidden sm:flex" id="search-bar">
          <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input id="search-input" type="text" placeholder="Buscar..." aria-label="Buscar">
        </div>

        <!-- Theme Toggle -->
        <button id="theme-toggle" class="theme-toggle-btn" onclick="window._toggleTheme()" aria-label="Cambiar tema">
          ☀️
        </button>

        <!-- Notifications -->
        <button class="btn btn-ghost btn-icon relative" aria-label="Notificaciones">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="notif-dot"></span>
        </button>

        <!-- Admin Avatar -->
        <div class="dropdown-container">
          <button class="dropdown-btn flex items-center gap-2 cursor-pointer border-none bg-transparent p-0" onclick="window._toggleDropdown(this)" aria-label="Menú de administrador">
            <div class="avatar-circle">AD</div>
          </button>
          <div class="dropdown-menu">
            <button class="dropdown-item" onclick="showToast('Perfil del administrador', 'info')">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              Perfil
            </button>
            <button class="dropdown-item" onclick="showToast('Configuración del panel', 'info')">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              Configuración
            </button>
            <button class="dropdown-item danger" onclick="showToast('Sesión cerrada', 'info')">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <main class="content-area">

      <!-- SECTION: Dashboard -->
      <section id="section-dashboard" class="section-content active"></section>

      <!-- SECTION: Users -->
      <section id="section-users" class="section-content"></section>

      <!-- SECTION: Agents -->
      <section id="section-agents" class="section-content"></section>

      <!-- SECTION: Skills -->
      <section id="section-skills" class="section-content"></section>

      <!-- SECTION: Contracts -->
      <section id="section-contracts" class="section-content"></section>

      <!-- SECTION: Error Logs -->
      <section id="section-error_logs" class="section-content"></section>

    </main>
  </div>

  <!-- ============================================================
       MODALS
       ============================================================ -->

  <!-- Modal: User Detail -->
  <div id="modal-user-detail" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Detalle de usuario">
    <div class="modal-content">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 dark:border-gray-700">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Detalle del Usuario</h2>
        <button class="modal-close-btn btn btn-ghost btn-icon" aria-label="Cerrar modal">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body p-6"></div>
    </div>
  </div>

  <!-- Modal: Agent Config -->
  <div id="modal-agent-config" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Configurar agente">
    <div class="modal-content">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 dark:border-gray-700">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Configurar Agente</h2>
        <button class="modal-close-btn btn btn-ghost btn-icon" aria-label="Cerrar modal">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body p-6"></div>
    </div>
  </div>

  <!-- Modal: Skill Detail -->
  <div id="modal-skill-detail" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Detalle de skill">
    <div class="modal-content">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 dark:border-gray-700">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Detalle de Skill</h2>
        <button class="modal-close-btn btn btn-ghost btn-icon" aria-label="Cerrar modal">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body p-6"></div>
    </div>
  </div>

  <!-- Modal: Contract Detail -->
  <div id="modal-contract-detail" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Detalle de contratación">
    <div class="modal-content">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 dark:border-gray-700">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Detalle de Contratación</h2>
        <button class="modal-close-btn btn btn-ghost btn-icon" aria-label="Cerrar modal">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body p-6"></div>
    </div>
  </div>

  <!-- Modal: Error Detail -->
  <div id="modal-error-detail" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Detalle de error">
    <div class="modal-content" style="max-width: 640px;">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 dark:border-gray-700">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Detalle del Error</h2>
        <button class="modal-close-btn btn btn-ghost btn-icon" aria-label="Cerrar modal">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body p-6"></div>
    </div>
  </div>

  <!-- ============================================================
       SCRIPTS
       ============================================================ -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
